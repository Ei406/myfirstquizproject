<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 02</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="lesson.html"><i class="fas fa-book"></i> Lessons</a>
        <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
    </nav>

    <div class="test-container">
        <div class="test-header">
            <a href="lesson.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Lessons</a>
            <h1>N5 Kanji Test 02</h1>
            <p>Choose the correct answer for the Kanji shown below.</p>
        </div>

        <div class="options">
            <div class="question-card">
                <p class="question-text">1. 木</p>
                <div class="answer-grid">
                    <input type="radio" id="q1_1" name="1"><label for="q1_1">かわ</label>
                    <input type="radio" value="correct" id="q1_2" name="1"><label for="q1_2">き</label>
                    <input type="radio" id="q1_3" name="1"><label for="q1_3">にほん</label>
                    <input type="radio" id="q1_4" name="1"><label for="q1_4">やま</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">2. 車</p>
                <div class="answer-grid">
                    <input type="radio" name="2" id="q2_1"><label for="q2_1">き</label>
                    <input type="radio" name="2" id="q2_2"><label for="q2_2">ひ</label>
                    <input type="radio" name="2" value="correct" id="q2_3"><label for="q2_3">くるま</label>
                    <input type="radio" name="2" id="q2_4"><label for="q2_4">つき</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">3. 門</p>
                <div class="answer-grid">
                    <input type="radio" name="3" id="q3_1"><label for="q3_1">ひと</label>
                    <input type="radio" name="3" id="q3_2"><label for="q3_2">げつ</label>
                    <input type="radio" name="3" value="correct" id="q3_3"><label for="q3_3">モン</label>
                    <input type="radio" name="3" id="q3_4"><label for="q3_4">かわ</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">4. 金</p>
                <div class="answer-grid">
                    <input type="radio" name="4" id="q4_1"><label for="q4_1">じん</label>
                    <input type="radio" name="4" id="q4_2"><label for="q4_2">すい</label>
                    <input type="radio" name="4" value="correct" id="q4_3"><label for="q4_3">かね</label>
                    <input type="radio" name="4" id="q4_4"><label for="q4_4">さん</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">5. 火</p>
                <div class="answer-grid">
                    <input type="radio" name="5" id="q5_1"><label for="q5_1">き</label>
                    <input type="radio" name="5" id="q5_2"><label for="q5_2">じん</label>
                    <input type="radio" name="5" value="correct" id="q5_3"><label for="q5_3">ひ</label>
                    <input type="radio" name="5" id="q5_4"><label for="q5_4">やま</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">6. 土</p>
                <div class="answer-grid">
                    <input type="radio" name="6" id="q6_1"><label for="q6_1">ほん</label>
                    <input type="radio" name="6" id="q6_2"><label for="q6_2">ひと</label>
                    <input type="radio" name="6" id="q6_3"><label for="q6_3">じん</label>
                    <input type="radio" name="6" value="correct" id="q6_4"><label for="q6_4">つち</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">7. 子·ども</p>
                <div class="answer-grid">
                    <input type="radio" name="7" value="correct" id="q7_1"><label for="q7_1">こども</label>
                    <input type="radio" name="7" id="q7_2"><label for="q7_2">ほんども</label>
                    <input type="radio" name="7" id="q7_3"><label for="q7_3">じん</label>
                    <input type="radio" name="7" id="q7_4"><label for="q7_4">ほん</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">8. 女</p>
                <div class="answer-grid">
                    <input type="radio" name="8" value="correct" id="q8_1"><label for="q8_1">おんな</label>
                    <input type="radio" name="8" id="q8_2"><label for="q8_2"> さん</label>
                    <input type="radio" name="8" id="q8_3"><label for="q8_3">ひと</label>
                    <input type="radio" name="8" id="q8_4"><label for="q8_4">た</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">9. 生</p>
                <div class="answer-grid">
                    <input type="radio" name="9" id="q9_1"><label for="q9_1">つき</label>
                    <input type="radio" name="9" id="q9_2"> <label for="q9_2">まな.ぶ</label>
                    <input type="radio" name="9" value="correct" id="q9_3"><label for="q9_3">う.まれる</label>
                    <input type="radio" name="9" id="q9_4"><label for="q9_4">やま</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">10. だい学</p>
                <div class="answer-grid">
                    <input type="radio" name="10" id="q10_1"><label for="q10_1">だいじな</label>
                    <input type="radio" name="10" id="q10_2"><label for="q10_2">まな.ぶ</label>
                    <input type="radio" name="10" value="correct" id="q10_3"><label for="q10_3">だいがく</label>
                    <input type="radio" name="10" id="q10_4"><label for="q10_4">だいがと</label>
                </div>
            </div>
        </div>

        <div class="submit-section">
            <button type="button" id="submit-btn" class="main-submit-btn">
                <i class="fas fa-check-circle"></i> Submit Answers
            </button>
            <div id="result"></div>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
