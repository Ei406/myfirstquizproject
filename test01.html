<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 01</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="lesson.html"><i class="fas fa-book"></i> Lessons</a>
        <a href="about.html"><i class="fas fa-info-circle"></i> About</a>
    </nav>

    <div class="test-container">
        <div class="test-header">
            <a href="lesson.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Lessons</a>
            <h1>N5 Kanji Test 01</h1>
            <p>Choose the correct answer for the Kanji shown below.</p>
        </div>

        <div class="options">
            <div class="question-card">
                <p class="question-text">1. 月</p>
                <div class="answer-grid">
                    <input type="radio" name="1" id="q1_1"> <label for="q1_1">にほんじん</label>
                    <input type="radio" name="1" value="correct" id="q1_2"><label for="q1_2">つき</label>
                    <input type="radio" name="1" id="q1_3"><label for="q1_3">にほん</label>
                    <input type="radio" name="1" id="q1_4"><label for="q1_4">やま</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text">2. 日</p>
                <div class="answer-grid">
                    <input type="radio" name="2" id="q2_1"><label for="q2_1">き</label>
                    <input type="radio" name="2" value="correct" id="q2_2"><label for="q2_2">にち</label>
                    <input type="radio" name="2" id="q2_3"><label for="q2_3">ほん</label>
                    <input type="radio" name="2" id="q2_4"><label for="q2_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">3. 川</p>
                <div class="answer-grid">
                    <input type="radio" name="3" id="q3_1"><label for="q3_1">き</label>
                    <input type="radio" name="3" value="correct" id="q3_2"><label for="q3_2">かわ</label>
                    <input type="radio" name="3" id="q3_3"><label for="q3_3">ほん</label>
                    <input type="radio" name="3" id="q3_4"><label for="q3_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">4. 三</p>
                <div class="answer-grid">
                    <input type="radio" name="4" id="q4_1"><label for="q4_1">じん</label>
                    <input type="radio" name="4" id="q4_2"><label for="q4_2">すい</label>
                    <input type="radio" name="4" value="correct" id="q4_3"><label for="q4_3">さん</label>
                    <input type="radio" name="4" id="q4_4"><label for="q4_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">5. 人</p>
                <div class="answer-grid">
                    <input type="radio" name="5" id="q5_1"><label for="q5_1">き</label>
                    <input type="radio" name="5" id="q5_2"><label for="q5_2">た</label>
                    <input type="radio" name="5" id="q5_3"><label for="q5_3">やま</label>
                    <input type="radio" name="5"  value="correct" id="q5_4"><label for="q5_4">ひと</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">6. 本</p>
                <div class="answer-grid">
                    <input type="radio" name="6" value="correct" id="q6_1"><label for="q6_1">ほん</label>
                    <input type="radio" name="6" id="q6_2"><label for="q6_2">にち</label>
                    <input type="radio" name="6" id="q6_3"><label for="q6_3">き</label>
                    <input type="radio" name="6" id="q6_4"><label for="q6_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">7.水 </p>
                <div class="answer-grid">
                    <input type="radio" name="7" id="q7_1"><label for="q7_1">じん</label>
                    <input type="radio" name="7" value="correct" id="q7_2"><label for="q7_2">みず</label>
                    <input type="radio" name="7" id="q7_3"><label for="q7_3">ほん</label>
                    <input type="radio" name="7" id="q7_4"><label for="q7_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">8. 田</p>
                <div class="answer-grid">
                    <input type="radio" name="8" id="q8_1"><label for="q8_1">やま</label>
                    <input type="radio" name="8" value="correct" id="q8_2"><label for="q8_2">た</label>
                    <input type="radio" name="8" id="q8_3"><label for="q8_3">ひと</label>
                    <input type="radio" name="8" id="q8_4"><label for="q8_4">つき</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text">9. 山</p>
                <div class="answer-grid">
                    <input type="radio" name="9" id="q9_1"><label for="q9_1">ひ</label>
                    <input type="radio" name="9" value="correct" id="q9_2"><label for="q9_2">やま</label>
                    <input type="radio" name="9" id="q9_3"><label for="q9_3">ほん</label>
                    <input type="radio" name="9" id="q9_4"><label for="q9_4">モン</label>
                </div>
            </div>
    
            <div class="question-card">
                <p class="question-text">10. 口</p>
                <div class="answer-grid">
                    <input type="radio" name="10" id="q10_1"><label for="q10_1">モン</label>
                    <input type="radio" name="10" id="q10_2"><label for="q10_2">にち</label>
                    <input type="radio" name="10" id="q10_3"><label for="q10_3">くるま</label>
                    <input type="radio" name="10" value="correct" id="q10_4"><label for="q10_4">くち</label>
                </div>
            </div>
        </div>    

        <div class="submit-section">
            <button type="button" id="submit-btn" class="main-submit-btn">
                <i class="fas fa-check-circle"></i> Submit Answers
            </button>
            <div id="result"></div>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
