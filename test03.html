<!DOCTYPE html>

    <nav class="navbar">

   <div class="test-container">
        <div class="test-header">
            <a href="lesson.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Lessons</a>

            <p>Choose the correct answer for the Kanji shown below.</p>
        </div>

            <div class="question-card">
                <p class="question-text"> 1. 先</p>
                <div class="answer-grid">
                    <input type="radio" id="q1_1" name="1"><label for="q1_1">かわ</label>

                </div>       
            </div>

            <div class="question-card">
                <p class="question-text"> 2. 私</p>
                <div class="answer-grid">
                    <input type="radio" name="2" id="q2_2"><label for="q2_2">にほん</label>
                    <input type="radio" name="2" id="q2_1"><label for="q2_1">き</label>
                    <input type="radio" name="2" id="q2_4"><label for="q2_4">つき</label>
                    <input type="radio" name="2" value="correct" id="q2_3"><label for="q2_3">わたし</label>
                    
                </div>
            </div>

            <div class="question-card">
                <p class="question-text"> 3. 一</p>
                <div class="answer-grid">
                    <input type="radio" name="3" value="correct" id="q3_1"><label for="q3_1">いち</label>

                    <input type="radio" name="3" id="q3_3"><label for="q3_3">わたし</label>
                    <input type="radio" name="3" id="q3_4"><label for="q3_4">かわ</label>
                </div>
            </div>
            <div class="question-card">
                <p class="question-text"> 4. 五</p>
                <div class="answer-grid">
                    <input type="radio" name="4" id="q4_1"><label for="q4_1">じん</label>
                    <input type="radio" name="4" id="q4_2"><label for="q4_2">ロク</label>
                    <input type="radio" name="4" value="correct" id="q4_3"><label for="q4_3">ゴ</label>
                    <input type="radio" name="4" id="q4_4"><label for="q4_4">さん</label>
                </div>
            </div>

            <div class="question-card">

                    <input type="radio" name="5" id="q5_4"><label for="q5_4">やま</label>
                </div>
            </div>

            <div class="question-card">
                <p class="question-text"> 6. 七</p>
                <div class="answer-grid">
                    <input type="radio" name="6" id="q6_1"><label for="q6_1">ほん</label>
                    <input type="radio" name="6" value="correct" id="q6_2"><label for="q6_2">なな</label>

                    <input type="radio" name="6" id="q6_4"><label for="q6_4">つち</label>

            <div class="question-card">
                <p class="question-text"> 7. 二</p>

                    <input type="radio" name="7" id="q7_4"><label for="q7_4">ほん</label>

            <div class="question-card">
                <p class="question-text"> 8. 六</p>

                    <input type="radio" name="8" id="q8_1"><label for="q8_1">にち</label>
                    <input type="radio" name="8" id="q8_2"><label for="q8_2"> さん</label>

                <div class="answer-grid">
                    <input type="radio" name="10" id="q10_1"><label for="q10_1">なな</label>
                    <input type="radio" name="10" value="correct" id="q10_2"><label for="q10_2">じゅう</label>
                    <input type="radio" name="10" id="q10_3"><label for="q10_3">はち</label>
                    <input type="radio" name="10" id="q10_4"><label for="q10_4">しち</label>

        </div>

        <div class="submit-section">
            <button type="button" id="submit-btn" class="main-submit-btn">
                <i class="fas fa-check-circle"></i> Submit Answers
            </button>
